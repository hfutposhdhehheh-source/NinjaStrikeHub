<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER MARKET | ULTIMATE EDITION</title>

<style>
/* ============================= */
/* ROOT & GLOBAL */
/* ============================= */
:root {
    --bg: #050505;
    --mint: #00ffcc;
    --purple: #7000ff;
    --glass: rgba(255,255,255,0.05);
    --blur: blur(12px);
    --radius: 16px;
    --transition: 0.3s ease;
}

* { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', 'Kanit', sans-serif; }
body { background: var(--bg); color: white; overflow-x:hidden; min-height: 100vh; }

/* ============================= */
/* ANIMATIONS */
/* ============================= */
@keyframes glow { 0% { box-shadow: 0 0 5px var(--mint); } 50% { box-shadow: 0 0 20px var(--purple); } 100% { box-shadow: 0 0 5px var(--mint); } }
@keyframes fadeUp { from { opacity:0; transform:translateY(40px);} to { opacity:1; transform:translateY(0);} }

/* ============================= */
/* UI COMPONENTS */
/* ============================= */
header { padding:20px; backdrop-filter: var(--blur); background: var(--glass); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.1); position: sticky; top:0; z-index: 100; }
.logo { color: var(--mint); font-weight:bold; font-size:24px; text-shadow: 0 0 10px var(--mint); }
.wallet { color: var(--mint); font-weight: bold; }

.controls { padding:20px; display:flex; gap:10px; flex-wrap:wrap; justify-content: center; }
input, select { padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background: var(--glass); color:white; outline: none; }

.grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap:20px; padding:20px; max-width: 1200px; margin: auto; }

.card { background: var(--glass); backdrop-filter: var(--blur); border-radius: var(--radius); padding:20px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; position:relative; overflow: hidden; }
.card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--mint); box-shadow: 0 0 20px rgba(0,255,204,0.2); }

.game-box { height:120px; border-radius:10px; margin-bottom:15px; display:flex; align-items:center; justify-content:center; font-weight:bold; }
.ff { background: linear-gradient(45deg, #ff4655, #ff8a95); }
.rov { background: linear-gradient(45deg, #0055ff, #00c3ff); }
.roblox { background: linear-gradient(45deg, #222, #555); }
.valorant { background: linear-gradient(45deg, #fa4454, #111); }
.genshin { background: linear-gradient(45deg, #40e0d0, #ffcc00); }

.tag { font-size:11px; color:var(--mint); font-weight:bold; display:block; margin-top:5px; }
.btn { padding:12px; border:none; border-radius:10px; background: var(--mint); color:black; cursor:pointer; font-weight:bold; transition: 0.3s; }
.btn:hover { transform: scale(1.05); filter: brightness(1.2); }
.btn:disabled { background:gray; cursor:not-allowed; }

/* Fixed Buttons Container */
.action-buttons { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }

/* Cart Panel */
.cart { position:fixed; right:-450px; top:0; width:400px; height:100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); padding:30px; transition: 0.5s; z-index: 2000; border-left: 1px solid var(--mint); }
.cart.active { right:0; }
#cartItems { margin: 20px 0; max-height: 60vh; overflow-y: auto; }
.cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #222; }

/* Dashboard & NPC */
#dashboard { padding:20px; max-width: 1200px; margin: auto; background: var(--glass); border-radius: 20px; margin-top: 50px; }
#npc-chat { position:fixed; bottom:0; left:20px; width:300px; background: rgba(0,0,0,0.9); border: 1px solid var(--mint); border-radius: 15px 15px 0 0; padding:15px; z-index: 1000; }
#chatLog { height: 150px; overflow-y: auto; font-size: 13px; margin-bottom: 10px; }

@media(max-width:768px){ .grid { grid-template-columns: repeat(2,1fr); } .cart { width: 100%; right: -100%; } }
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<header>
    <div class="logo">CYBER MARKET</div>
    <div class="wallet">💰 <span id="money">100,000</span> ฿</div>
    <button class="btn" onclick="toggleCart()" style="background: var(--purple); color: white;">🛒 ตะกร้าสินค้า</button>
</header>

<div class="controls">
    <input type="text" id="search" placeholder="🔍 ค้นหาไอดีเทพ...">
    <select id="filter">
        <option value="all">ทุกเกม</option>
        <option value="ff">Free Fire</option>
        <option value="rov">ROV</option>
        <option value="roblox">Roblox</option>
        <option value="valorant">Valorant</option>
        <option value="genshin">Genshin</option>
    </select>
</div>

<div class="grid" id="grid"></div>

<div class="action-buttons">
    <button class="btn" onclick="openLootBox()" style="background: #ffcc00;">🎰 เปิดกล่องสุ่ม</button>
    <button class="btn" onclick="recommend()" style="background: var(--purple); color: white;">🤖 AI แนะนำ</button>
    <button class="btn" onclick="startGame()" style="background: #ff4655; color: white;">🎯 เกมหาเงิน</button>
</div>

<div class="cart" id="cart">
    <h2 style="color: var(--mint);">SHOPPING CART</h2>
    <div id="cartItems"></div>
    <hr style="border: 0.5px solid #333;">
    <div style="margin: 20px 0;">
        <h3>ยอดรวม: <span id="total">0</span> ฿</h3>
        <p style="font-size: 12px; color: #888;">+ ภาษีสนามรบ 7%</p>
    </div>
    <button class="btn" onclick="app.checkout()" style="width: 100%; padding: 15px; font-size: 18px;">ชำระเงินทันที</button>
    <button class="btn" onclick="toggleCart()" style="width: 100%; margin-top: 10px; background: #333; color: #fff;">ปิดหน้าต่าง</button>
</div>

<div id="dashboard">
    <h2 style="color: var(--mint);">📊 ประวัติการสั่งซื้อ</h2>
    <div id="history" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin: 20px 0;"></div>
    <div style="background: #111; padding: 20px; border-radius: 15px;">
        <h3>💸 เติมเงินด่วน</h3>
        <input id="topupAmount" type="number" placeholder="จำนวนเงิน" style="width: 200px;">
        <button class="btn" onclick="topup()">ยืนยันการเติม</button>
    </div>
</div>

<div id="npc-chat">
    <h4 style="color: var(--mint);">🤖 NPC SELLER</h4>
    <div id="chatLog"></div>
    <input id="chatInput" placeholder="ถามอะไรหน่อยไหม..." style="width: 100%;">
</div>

<footer style="padding:50px; text-align: center; color: #444;">
    <p>© 2026 CYBER MARKET | Line: @NinjaShop | FB: Ninja Market</p>
</footer>

<script>
/* ============================= */
/* CORE SYSTEMS */
/* ============================= */

const MOCK_DATA = [
    {id:1,name:"Sakura S1",price:5000,game:"ff",sold:false,tag:"🔥 HOT"},
    {id:2,name:"Dragon Fruit Awakening",price:7000,game:"roblox",sold:false,tag:"💎 LIMITED"},
    {id:3,name:"EVO Gun Max",price:9000,game:"rov",sold:false,tag:"⭐ RECOMMENDED"},
    {id:4,name:"Immortal Set",price:8000,game:"genshin",sold:false,tag:"💰 SALE"},
    {id:5,name:"Radiant Skin",price:6000,game:"valorant",sold:false},
    {id:6,name:"Mythic Blade",price:7500,game:"ff",sold:false},
    {id:7,name:"Cyber Knight",price:8200,game:"rov",sold:false},
    {id:8,name:"Dark Phantom",price:9100,game:"valorant",sold:false},
    {id:9,name:"Golden Hero",price:6500,game:"genshin",sold:false},
    {id:10,name:"Shadow Beast",price:8800,game:"roblox",sold:false},
    {id:11,name:"Ice Queen",price:7200,game:"ff",sold:false},
    {id:12,name:"Fire Dragon",price:9900,game:"rov",sold:false},
    {id:13,name:"Legend Sniper",price:8400,game:"valorant",sold:false},
    {id:14,name:"Galaxy Mage",price:7900,game:"genshin",sold:false},
    {id:15,name:"Phantom Set",price:8700,game:"roblox",sold:false}
];

class Wallet {
    constructor() {
        this.balance = 100000;
        this.updateUI();
    }
    subtract(amount) {
        if (this.balance >= amount) {
            this.balance -= amount;
            this.updateUI();
            return true;
        }
        alert("เงินไม่พอครับพี่!"); return false;
    }
    add(amount) { this.balance += amount; this.updateUI(); }
    updateUI() { document.getElementById("money").innerText = this.balance.toLocaleString(); }
}

class Cart {
    constructor() { this.items = []; }
    add(item) {
        if(item.sold) return;
        if(this.items.find(i => i.id === item.id)) return alert("มีในตะกร้าแล้ว!");
        this.items.push(item);
        this.render();
        showToast("เพิ่มลงตะกร้าแล้ว!");
    }
    remove(id) { this.items = this.items.filter(i => i.id !== id); this.render(); }
    getTotal() { return this.items.reduce((sum, i) => sum + i.price, 0); }
    render() {
        const container = document.getElementById("cartItems");
        container.innerHTML = this.items.map(item => `
            <div class="cart-item">
                <span>${item.name}</span>
                <span>${item.price.toLocaleString()} ฿ <button onclick="app.cart.remove(${item.id})" style="background:none; border:none; color:red; cursor:pointer;">❌</button></span>
            </div>
        `).join("");
        document.getElementById("total").innerText = this.getTotal().toLocaleString();
    }
}

class App {
    constructor() {
        this.wallet = new Wallet();
        this.cart = new Cart();
        this.products = MOCK_DATA;
        this.renderProducts();
    }
    renderProducts() {
        const grid = document.getElementById("grid");
        const search = document.getElementById("search").value.toLowerCase();
        const filter = document.getElementById("filter").value;
        grid.innerHTML = "";

        this.products.forEach(p => {
            if ((filter === "all" || p.game === filter) && p.name.toLowerCase().includes(search)) {
                const div = document.createElement("div");
                div.className = "card";
                div.innerHTML = `
                    <div class="game-box ${p.game}">${p.game.toUpperCase()}</div>
                    <h3>${p.name}</h3>
                    <p style="color:var(--mint); font-size:20px; font-weight:bold;">${p.price.toLocaleString()} ฿</p>
                    <span class="tag">${p.tag || ""}</span>
                    <button class="btn" style="width:100%; margin-top:15px;" ${p.sold ? "disabled" : ""} onclick="app.cart.add(app.products.find(x=>x.id===${p.id}))">
                        ${p.sold ? "ขายแล้ว" : "🛒 สั่งซื้อ"}
                    </button>
                `;
                grid.appendChild(div);
            }
        });
    }
    checkout() {
        const total = this.cart.getTotal();
        if(total === 0) return;
        if (this.wallet.subtract(total)) {
            this.cart.items.forEach(i => {
                const p = this.products.find(x => x.id === i.id);
                if(p) p.sold = true;
            });
            saveHistory(this.cart.items, total);
            this.cart.items = [];
            this.cart.render();
            this.renderProducts();
            alert("ชำระเงินสำเร็จ! ข้อมูลไอดีส่งไปที่ Email ของคุณแล้ว");
        }
    }
}

/* ============================= */
/* MATRIX EFFECT */
/* ============================= */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const letters = "010101010101";
const drops = Array(Math.floor(canvas.width/14)).fill(1);
function drawMatrix() {
    ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#00ffcc22"; ctx.font = "14px monospace";
    drops.forEach((y, i) => {
        ctx.fillText(letters[Math.floor(Math.random()*letters.length)], i*14, y*14);
        if (y*14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    });
}
setInterval(drawMatrix, 50);
window.addEventListener("resize", () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

/* ============================= */
/* FEATURES */
/* ============================= */
function toggleCart() { document.getElementById("cart").classList.toggle("active"); }

function saveHistory(items, total) {
    const history = JSON.parse(localStorage.getItem("history") || "[]");
    history.push({ date: new Date().toLocaleString(), total });
    localStorage.setItem("history", JSON.stringify(history));
    renderHistory();
}

function renderHistory() {
    const history = JSON.parse(localStorage.getItem("history") || "[]");
    document.getElementById("history").innerHTML = history.map(h => `
        <div class="card" style="font-size:12px;">
            <p>${h.date}</p>
            <p style="color:var(--mint)">ยอด: ${h.total.toLocaleString()} ฿</p>
        </div>
    `).join("");
}

function topup() {
    const val = parseInt(document.getElementById("topupAmount").value);
    if(val > 0) { app.wallet.add(val); alert("เติมเงินสำเร็จ!"); }
}

function showToast(msg) {
    const t = document.createElement("div");
    t.innerText = msg;
    t.style = "position:fixed; bottom:80px; right:20px; background:var(--mint); color:black; padding:10px 20px; border-radius:10px; z-index:5000; font-weight:bold; animation:fadeUp 0.3s;";
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
}

function openLootBox() {
    const items = app.products.filter(p => !p.sold);
    const reward = items[Math.floor(Math.random()*items.length)];
    const overlay = document.createElement("div");
    overlay.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column;";
    overlay.innerHTML = `<h1 style="color:var(--mint); animation:glow 1s infinite;">🎰 YOU GOT!</h1><h2>${reward.name}</h2><button class="btn" onclick="this.parentElement.remove(); app.cart.add(app.products.find(x=>x.id===${reward.id}))" style="margin-top:20px;">เก็บเข้าตะกร้า</button>`;
    document.body.appendChild(overlay);
}

function recommend() {
    const pick = app.products[Math.floor(Math.random()*app.products.length)];
    showToast("🤖 แนะนำ: " + pick.name);
}

function startGame() {
    const target = document.createElement("div");
    target.style = "position:fixed; width:60px; height:60px; background:var(--mint); border-radius:50%; z-index:8000; cursor:crosshair; box-shadow:0 0 20px var(--mint);";
    target.style.left = Math.random()*(window.innerWidth-60)+"px";
    target.style.top = Math.random()*(window.innerHeight-60)+"px";
    target.onclick = () => { app.wallet.add(500); showToast("💰 +500 ฿"); target.remove(); };
    document.body.appendChild(target);
    setTimeout(() => { if(target) target.remove(); }, 2000);
}

/* NPC CHAT */
document.getElementById("chatInput").onkeydown = (e) => {
    if(e.key === "Enter") {
        const val = e.target.value;
        const log = document.getElementById("chatLog");
        log.innerHTML += `<p>👤: ${val}</p>`;
        const replies = ["ของดีๆ ทั้งนั้นเลยนะ!", "วันนี้คนเยอะจังนะคุณ", "สนใจไอดี ROV ไหมครับ?", "ซื้อเยอะลดให้ไม่ได้แต่แถมใจให้นะ!"];
        log.innerHTML += `<p style="color:var(--mint)">🤖: ${replies[Math.floor(Math.random()*replies.length)]}</p>`;
        e.target.value = "";
        log.scrollTop = log.scrollHeight;
    }
};

const app = new App();
renderHistory();
document.getElementById("search").oninput = () => app.renderProducts();
document.getElementById("filter").onchange = () => app.renderProducts();

</script>
</body>
</html>
